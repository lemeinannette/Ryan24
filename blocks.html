<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blocks — Forest Inventory</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Block Management</h1>

<div class="theme-switch-wrapper">
  <label class="theme-switch">
    <input type="checkbox" id="theme-toggle-checkbox">
    <div class="slider"></div>
  </label>
  <em>Dark Mode</em>
</div>

<div class="page-content">

  <div class="form-card">
    <h3>Add New Block</h3>
    <div class="form-grid">
      <select id="bforest"></select>
      <input type="text" id="bname" placeholder="Block Name">
      <input type="number" id="bsize" placeholder="Size (ha)">
    </div>
    <button onclick="addBlock()">Add Block</button>
  </div>

  <div class="table-container">
    <!-- FIX: Removed inline margin:0 on search input — let stylesheet handle spacing -->
    <div class="table-header">
      <h3>Block List</h3>
      <input type="text" id="block-search" placeholder="Search..." onkeyup="searchBlocks()">
    </div>

    <table>
      <thead>
        <tr>
          <th>ID</th><th>Name</th><th>Forest</th><th>Size (ha)</th><th>Action</th>
        </tr>
      </thead>
      <tbody id="block-tbody"></tbody>
    </table>
  </div>

</div>

<hr>
<p><a href="dashboard.html">Back to Dashboard</a></p>

<script src="app.js"></script>
</body>
</html>
