<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Forest Inventory</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!--  Auth guard — app.js should call requireAuth() at top of this page's init -->

<div class="dashboard-header">
  <div class="header-text">
    <h1>Forest Inventory</h1>
    <p id="date"></p>
  </div>

  
  <div class="header-controls">
    <div class="user-info">
      <p id="welcome-msg">Welcome, User</p>
      <span id="user-role">Role</span>
    </div>

    <div class="theme-switch-wrapper">
      <label class="theme-switch">
        <input type="checkbox" id="theme-toggle-checkbox">
        <div class="slider"></div>
      </label>
      <em>Dark Mode</em>
    </div>
  </div>
</div>

<div class="stats-container">
  <div class="stat-box">
    <h4>Total Forests</h4>
    <div class="number" id="stat-forests">0</div>
  </div>
  <div class="stat-box">
    <h4>Total Species</h4>
    <div class="number" id="stat-species">0</div>
  </div>
  <div class="stat-box">
    <h4>Total Blocks</h4>
    <div class="number" id="stat-blocks">0</div>
  </div>
  <div class="stat-box">
    <h4>Total Records</h4>
    <div class="number" id="stat-records">0</div>
  </div>
</div>

<div class="table-container admin-only">
  <h3>Recent Forests</h3>
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>County</th>
        <th>Area</th>
      </tr>
    </thead>
    <tbody id="dash-forests"></tbody>
  </table>
</div>

<div class="table-container">
  <h3>Recent Inventory</h3>
  <table>
    <thead>
      <tr>
        <th>Block</th>
        <th>Species</th>
        <th>Trees</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="dash-inventory"></tbody>
  </table>
</div>

<hr>

<!-- FIX: Replaced inline styles on nav links with a CSS class -->
<nav class="page-nav">
  <a href="forests.html" class="admin-only">Forests</a>
  <a href="blocks.html" class="admin-only">Blocks</a>
  <a href="species.html" class="admin-only">Species</a>
  <a href="inventory.html">Inventory</a>
  <a href="#" onclick="logout()" class="nav-danger">Logout</a>
</nav>

<script src="app.js"></script>
</body>
</html>
