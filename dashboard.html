<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Main Header Section -->
<div class="dashboard-header">
  <!-- Left Side: Title and Date -->
  <div class="header-text">
    <h1>Forest Inventory</h1>
    <p id="date"></p>
  </div>
  
  <!-- Right Side: User Info and Controls -->
  <div style="display: flex; align-items: center; gap: 20px;">
    
    <!-- User Info (Welcome & Badge) -->
    <div style="text-align: right;">
      <p id="welcome-msg" style="margin:0; font-weight: 600; color: var(--text);">Welcome, User</p>
      <!-- Role Badge -->
      <span id="user-role" style="font-size: 0.75rem; padding: 2px 8px; border-radius: 4px; color: white; text-transform: uppercase; letter-spacing: 0.5px;">Role</span>
    </div>

    <!-- Dark Mode Toggle -->
    <div class="theme-switch-wrapper">
      <label class="theme-switch">
        <input type="checkbox" id="theme-toggle-checkbox">
        <div class="slider"></div>
      </label>
      <em>Dark Mode</em>
    </div>
  </div>
</div>

<!-- Statistics Grid -->
<div class="stats-container">
  <div class="stat-box">
    <h4>Total Forests</h4>
    <div class="number" id="stat-forests">0</div>
  </div>
  <div class="stat-box">
    <h4>Total Species</h4>
    <div class="number" id="stat-species">0</div>
  </div>
  <div class="stat-box">
    <h4>Total Blocks</h4>
    <div class="number" id="stat-blocks">0</div>
  </div>
  <div class="stat-box">
    <h4>Total Records</h4>
    <div class="number" id="stat-records">0</div>
  </div>
</div>

<!-- Recent Forests Table (Admin Only) -->
<div class="table-container admin-only">
  <h3>Recent Forests</h3>
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>County</th>
        <th>Area</th>
      </tr>
    </thead>
    <tbody id="dash-forests"></tbody>
  </table>
</div>

<!-- Recent Inventory Table -->
<div class="table-container">
  <h3>Recent Inventory</h3>
  <table>
    <thead>
      <tr>
        <th>Block</th>
        <th>Species</th>
        <th>Trees</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="dash-inventory"></tbody>
  </table>
</div>

<hr>

<!-- Navigation Links -->
<p style="text-align:center; margin-top: 20px;">
  <!-- Added admin-only class to management links -->
  <a href="forests.html" class="admin-only" style="margin: 0 10px;">Forests</a>
  <a href="blocks.html" class="admin-only" style="margin: 0 10px;">Blocks</a>
  <a href="species.html" class="admin-only" style="margin: 0 10px;">Species</a>
  
  <!-- Inventory and Logout are visible to everyone -->
  <a href="inventory.html" style="margin: 0 10px;">Inventory</a>
  <a href="#" onclick="logout()" style="color:var(--danger); margin: 0 10px;">Logout</a>
</p>

<script src="app.js"></script>
</body>
</html>
