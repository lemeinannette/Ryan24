<!DOCTYPE html>
<html>
<head>
  <title>Login - Forest System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

  <div class="form-card">
    <h2>Forest Inventory</h2>
    
    <!-- Dark Mode Toggle -->
    <div class="theme-switch-wrapper" style="margin-bottom: 20px;">
      <label class="theme-switch">
        <input type="checkbox" id="theme-toggle-checkbox">
        <div class="slider"></div>
      </label>
      <em>Dark Mode</em>
    </div>

    <input type="text" id="username" placeholder="User ID (e.g. USR-101)">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p style="margin-top: 20px;">Don't have an account? <a href="register.html">Register here</a></p>
  </div>

<script src="app.js"></script>
</body>
</html>
