<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Records — Forest Inventory</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1>Inventory Records</h1>

<div class="page-content">

  <div class="form-card">
    <h3>Add New Record</h3>
    <div class="form-grid">
      
      <!-- app.js must populate #iblock from blocks data and #ispecies from species data -->
      <select id="iblock">
        <option value="" disabled selected>Select Block</option>
      </select>
      <select id="ispecies">
        <option value="" disabled selected>Select Species</option>
      </select>

      <input type="number" id="icount" placeholder="Tree Count">
      <input type="date" id="idate">
    </div>
    <button onclick="addRecord()">Add Record</button>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <p>Total Trees</p>
      <span id="total-trees">0</span>
    </div>
    <div class="stat-card">
      <p>Total Records</p>
      <span id="total-records">0</span>
    </div>
  </div>

  <div class="chart-card">
    <h3>Trees Distribution by Species</h3>
    <div style="position: relative; height: 350px; width: 100%;">
      <canvas id="speciesChart"></canvas>
    </div>
  </div>

  <div class="table-container">
    <!-- FIX: Removed inline margin:0 on search input -->
    <div class="table-header">
      <h3>All Records</h3>
      <input type="text" id="inv-search" placeholder="Search..." onkeyup="searchRecords()">
    </div>

    <table>
      <thead>
        <tr>
          <th>ID</th><th>Block</th><th>Species</th><th>Count</th><th>Date</th><th>Action</th>
        </tr>
      </thead>
      <tbody id="inv-tbody"></tbody>
    </table>
  </div>

</div>

<hr>
<p><a href="dashboard.html">Back to Dashboard</a></p>

<script src="app.js"></script>
</body>
</html>
