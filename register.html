<!DOCTYPE html>
<html>
<head>
  <title>Register - Forest System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

  <div class="form-card">
    <h2>Create Account</h2>

    <!-- Dark Mode Toggle -->
    <div class="theme-switch-wrapper" style="margin-bottom: 20px;">
      <label class="theme-switch">
        <input type="checkbox" id="theme-toggle-checkbox">
        <div class="slider"></div>
      </label>
      <em>Dark Mode</em>
    </div>

    <input type="text" id="reg-fullname" placeholder="Full Name">
    <input type="password" id="reg-password" placeholder="Password">
    
    <!-- Password Requirements Text -->
    <p style="font-size: 0.75rem; color: var(--text-muted); text-align: left; margin-top: -10px; margin-bottom: 15px;">
      * Password must be min 8 chars, include Uppercase, Number & Special char.
    </p>

    <input type="password" id="reg-confirm" placeholder="Confirm Password">
    <button onclick="register()">Register</button>
    <p style="margin-top: 20px;">Already have an account? <a href="index.html">Login here</a></p>
  </div>

<script src="app.js"></script>
</body>
</html>
