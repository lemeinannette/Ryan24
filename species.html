<!DOCTYPE html>
<html>
<head>
  <title>Manage Species</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Species Management</h1>

<div class="page-content">
  <!-- Uniform Form Card -->
  <div class="form-card">
    <h3>Add New Species</h3>
    <input type="text" id="spec-name" placeholder="Species Name (e.g. Mahogany)">
    <button onclick="addSpecies()">Add Species</button>
  </div>

  <!-- Table Container -->
  <div class="table-container">
    <h3>Species List</h3>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="spec-tbody"></tbody>
    </table>
  </div>
</div>

<hr>
<p><a href="dashboard.html">Back to Dashboard</a></p>

<script src="app.js"></script>
</body>
</html>
