<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Species — Forest Inventory</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Species Management</h1>

<div class="theme-switch-wrapper">
  <label class="theme-switch">
    <input type="checkbox" id="theme-toggle-checkbox">
    <div class="slider"></div>
  </label>
  <em>Dark Mode</em>
</div>

<div class="page-content">

  <div class="form-card">
    <h3>Add New Species</h3>
    <input type="text" id="spec-name" placeholder="Species Name (e.g. Mahogany)">
    <button onclick="addSpecies()">Add Species</button>
  </div>

  <div class="table-container">
    <h3>Species List</h3>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="spec-tbody"></tbody>
    </table>
  </div>

</div>

<hr>
<p><a href="dashboard.html">Back to Dashboard</a></p>

<script src="app.js"></script>
</body>
</html>
